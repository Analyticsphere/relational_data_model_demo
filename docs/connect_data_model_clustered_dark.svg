    <tspan x="14" y="480">                                                              ╰──────────────────────────────────────────────────────────────────╯</tspan>
    <tspan x="14" y="493"></tspan>
    <tspan x="14" y="506">─── Responses &amp; sessions (fact) ───</tspan>
